name: Release React Native (npm)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # Required for npm provenance

jobs:
  publish:
    runs-on: macos-15   # macOS required for iOS XCFramework build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from tag
        id: version
        run: |
          if [[ "$GITHUB_REF_NAME" == rn-v* ]]; then
            VERSION="${GITHUB_REF_NAME#rn-v}"
          else
            VERSION=$(node -p "require('./platforms/react-native/package.json').version")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Verify package.json version matches tag
        if: startsWith(github.ref_name, 'rn-v')
        run: |
          PKG_VERSION=$(node -p "require('./platforms/react-native/package.json').version")
          if [ "$PKG_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::platforms/react-native/package.json version '$PKG_VERSION' does not match tag ${{ steps.version.outputs.version }}"
            exit 1
          fi
          echo "Version OK: $PKG_VERSION"

      - name: Install Rust (Android + iOS targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >
            aarch64-linux-android,
            armv7-linux-androideabi,
            x86_64-linux-android,
            aarch64-apple-ios,
            aarch64-apple-ios-sim,
            x86_64-apple-ios,
            aarch64-apple-darwin,
            x86_64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r27

      - name: Build Android native libs
        run: bash platforms/android/build-android.sh
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}

      - name: Build Apple XCFramework (iOS + macOS)
        run: bash scripts/build-apple-xcframework.sh

      - name: Verify XCFramework platform slices
        run: bash scripts/verify-xcframework-slices.sh platforms/ios/RaTeX.xcframework ios macos

      - name: Inject native libs into React Native package
        run: |
          mkdir -p platforms/react-native/android/src/main/jniLibs
          cp -R platforms/android/src/main/jniLibs/* platforms/react-native/android/src/main/jniLibs/
          rm -rf platforms/react-native/ios/RaTeX.xcframework
          cp -R platforms/ios/RaTeX.xcframework platforms/react-native/ios/
          echo "jniLibs and XCFramework injected into platforms/react-native"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies and build
        run: |
          cd platforms/react-native
          npm ci
          npm run build

      - name: Publish to npm
        run: |
          cd platforms/react-native
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
