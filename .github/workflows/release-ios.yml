name: Release iOS

# Triggered by a version tag, e.g. git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  build-and-release:
    runs-on: macos-15
    permissions:
      contents: write   # 允许 GITHUB_TOKEN 推送 tag 和创建 Release

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build XCFramework
        run: bash platforms/ios/build-ios.sh

      - name: Verify XCFramework platform slices
        run: bash scripts/verify-xcframework-slices.sh platforms/ios/RaTeX.xcframework ios

      # Zip the XCFramework — SPM requires a zip for remote binary targets
      - name: Package XCFramework
        run: |
          cd platforms/ios
          zip -r RaTeX.xcframework.zip RaTeX.xcframework
          echo "CHECKSUM=$(swift package compute-checksum RaTeX.xcframework.zip)" >> $GITHUB_ENV
          echo "TAG=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      # Patch Package.swift: replace the local binaryTarget with a remote one.
      # The sed substitution targets the exact block written in Package.swift.
      - name: Patch Package.swift for release
        run: |
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/RaTeX.xcframework.zip"
          # Replace the local binaryTarget block with a remote one
          python3 - <<'PYEOF'
          import re, os

          tag      = os.environ["TAG"]
          checksum = os.environ["CHECKSUM"]
          repo     = "${{ github.repository }}"
          url      = f"https://github.com/{repo}/releases/download/{tag}/RaTeX.xcframework.zip"

          with open("Package.swift") as f:
              src = f.read()

          old = r'\.binaryTarget\(\s*name:\s*"RaTeXFFI",\s*path:\s*"platforms/ios/RaTeX\.xcframework"\s*\)'
          new = (
              '.binaryTarget(\n'
              '            name: "RaTeXFFI",\n'
              f'            url: "{url}",\n'
              f'            checksum: "{checksum}"\n'
              '        )'
          )
          src = re.sub(old, new, src, flags=re.DOTALL)
          with open("Package.swift", "w") as f:
              f.write(src)
          print("Package.swift patched.")
          PYEOF

      - name: Commit patched Package.swift
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift
          git commit -m "chore: update Package.swift for release ${TAG}"
          git tag -f "${TAG}"
          git push origin "refs/tags/${TAG}" --force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: platforms/ios/RaTeX.xcframework.zip
